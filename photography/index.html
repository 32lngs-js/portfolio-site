<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Stack — Dialkit Exact</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 24px;
      padding: 40px 40px 80px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.dark {
      background: #0d0d0d;
      color: #e8e8e8;
    }

    /* ─── Footer ─── */
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      border-top: 1px solid rgba(0,0,0,0.08);
      background: #ffffff;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    body.dark .site-footer {
      background: #0d0d0d;
      border-top-color: rgba(255,255,255,0.08);
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      color: #aaa;
      border-radius: 6px;
      padding: 0;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .theme-toggle:hover {
      color: #555;
      background: rgba(0,0,0,0.06);
    }

    body.dark .theme-toggle { color: #666; }
    body.dark .theme-toggle:hover {
      color: #aaa;
      background: rgba(255,255,255,0.06);
    }

    .theme-toggle svg { display: block; }

    .header h1 {
      font-size: 48px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0;
      letter-spacing: -0.02em;
      transition: color 0.3s ease;
    }
    .header p {
      font-size: 18px;
      color: #888;
      margin: 4px 0 0;
      transition: color 0.3s ease;
    }
    body.dark .header h1 { color: #e8e8e8; }
    body.dark .header p  { color: #555; }

    /* ─── Container: width = cardW + 180 for back card, height = cardH + shadow bleed ─── */
    .photostack {
      position: relative;
      width: 660px;   /* 480 + 180 */
      height: 680px;  /* 660 + 20 shadow bleed */
    }

    /* ─── Shadow layer: blurred duplicates, no pointer events ─── */
    .shadow-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .shadow-card {
      position: absolute;
      width: 480px;
      height: 660px;
      transform-origin: bottom left;
      border-radius: 2px;
      overflow: hidden;
    }

    .shadow-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .shadow-card .blur-inner {
      position: absolute;
      inset: 0;
      transform: scale(1.03) translateY(8px);
      filter: blur(14px);
      border-radius: 2px;
      overflow: hidden;
    }

    /* ─── Card layer: actual clickable photos ─── */
    /* clip-path allows overflow right/top, clips bottom/left */
    .card-layer {
      position: absolute;
      inset: 0;
      clip-path: inset(-100px -200px 0 0);
    }

    .photo-card {
      position: absolute;
      width: 480px;
      height: 660px;
      transform-origin: bottom left;
      border-radius: 2px;
      overflow: hidden;
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-card .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #000000 0%, transparent 100%);
      pointer-events: none;
    }

    /* ─── Spring transition: visualDuration 0.5s, bounce 0.04 (barely bouncy) ─── */
    .photo-card,
    .shadow-card {
      transition:
        transform 0.5s cubic-bezier(0.34, 1.08, 0.64, 1),
        opacity   0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        z-index   0s;
    }

    /* ─── Positions ─── */
    /* Front: identity */
    .photo-card.pos-front    { transform: none; z-index: 2; cursor: pointer; }
    .shadow-card.pos-front   { transform: none; z-index: 2; opacity: 0.25; }

    /* Back: translateX(337px) scale(0.7) */
    .photo-card.pos-back     { transform: translateX(337px) scale(0.7); z-index: 1; cursor: default; }
    .shadow-card.pos-back    { transform: translateX(337px) scale(0.7); z-index: 1; opacity: 0.125; }

    /* Entering back: starts further right + more shrunk (initial state before animating in) */
    .photo-card.pos-entering { transform: translateX(337px) scale(0.56); z-index: 0; opacity: 0; }
    .shadow-card.pos-entering{ transform: translateX(337px) scale(0.56); z-index: 0; opacity: 0; }

    /* Exiting front: slides off to the left */
    .photo-card.pos-exiting  { transform: translateX(-480px) scale(1); z-index: 3; opacity: 0; }
    .shadow-card.pos-exiting { transform: translateX(-480px) scale(1); z-index: 3; opacity: 0; }

    /* Retreat: new front enters from the left */
    .photo-card.pos-left-entering  { transform: translateX(-480px) scale(1); z-index: 1; opacity: 0; cursor: default; }
    .shadow-card.pos-left-entering { transform: translateX(-480px) scale(1); opacity: 0; }

    /* Retreat: old back exits further to the right */
    .photo-card.pos-right-exiting  { transform: translateX(480px) scale(0.5); z-index: 0; opacity: 0; cursor: default; }
    .shadow-card.pos-right-exiting { transform: translateX(480px) scale(0.5); opacity: 0; }

    /* ─── Overlay opacity controlled via CSS variable ─── */
    .photo-card.pos-front .overlay  { opacity: 0; transition: opacity 0.5s ease; }
    .photo-card.pos-back .overlay   { opacity: 0.6; transition: opacity 0.5s ease; }
    .photo-card.pos-entering .overlay       { opacity: 0.6; }
    .photo-card.pos-exiting .overlay        { opacity: 0; }
    .photo-card.pos-left-entering .overlay  { opacity: 0; }
    .photo-card.pos-right-exiting .overlay  { opacity: 0.6; }

    /* hover / tap states on front only */
    .photo-card.pos-front:hover  { transform: scale(1.01); }
    .photo-card.pos-front:active { transform: scale(0.99); }

    /* ─── Masonry view (natural heights) ─── */
    .photo-masonry {
      display: none;
      column-count: 3;
      column-gap: 16px;
      width: min(960px, calc(100vw - 80px));
    }

    .photo-masonry.active { display: block; }

    .masonry-cell {
      break-inside: avoid;
      margin-bottom: 16px;
      cursor: pointer;
      overflow: hidden;
    }

    .masonry-cell img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .masonry-cell:hover img { transform: scale(1.03); }
    .masonry-cell:active img { transform: scale(1.01); }

    /* ─── Justified view (CSS masonry grid) ─── */
    .photo-justified {
      display: none;
      width: min(960px, calc(100vw - 80px));
    }

    .photo-justified.active {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      grid-auto-rows: 8px;
      gap: 16px;
      align-items: start;
    }

    .justified-card {
      min-width: 0;
      grid-row-end: span 40;
      overflow: hidden;
      cursor: pointer;
    }

    .justified-card img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
    }

    .justified-card:hover img { transform: scale(1.015); }

    /* ─── Editorial view (flex hero/pair layout) ─── */
    .photo-editorial {
      display: none;
      width: min(960px, calc(100vw - 80px));
    }

    .photo-editorial.active {
      display: flex;
      flex-wrap: wrap;
      row-gap: clamp(44px, 6vw, 80px);
    }

    .editorial-card {
      width: var(--slot, 50%);
      min-width: 0;
      display: flex;
      justify-content: var(--align, center);
      padding: 0 8px;
    }

    .editorial-frame {
      width: var(--img-w, 80%);
      overflow: hidden;
      cursor: pointer;
    }

    .editorial-card:not(.is-large).is-portrait .editorial-frame {
      max-width: 50%;
    }

    .editorial-frame img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0;
      transform: scale(0.992);
      transition: opacity 420ms ease, transform 420ms ease;
    }

    .editorial-frame img.is-loaded {
      opacity: 1;
      transform: scale(1);
    }

    .editorial-frame:hover img { transform: scale(1.012); }

    /* ─── View toggle buttons ─── */
    .view-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      color: #ccc;
      border-radius: 6px;
      padding: 0;
      margin-left: 2px;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .view-toggle:hover { color: #555; background: rgba(0,0,0,0.06); }
    .view-toggle.active { color: #1a1a1a; }

    body.dark .view-toggle { color: #444; }
    body.dark .view-toggle:hover { color: #aaa; background: rgba(255,255,255,0.06); }
    body.dark .view-toggle.active { color: #e8e8e8; }

    .view-toggle svg { display: block; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Japan</h1>
    <p>December 2025</p>
  </div>

  <div class="photostack" id="photostack">

    <!-- Shadow layer (blurred copies for depth) -->
    <div class="shadow-layer" id="shadowLayer">
      <!-- cards injected by JS -->
    </div>

    <!-- Card layer (actual photos) -->
    <div class="card-layer" id="cardLayer">
      <!-- cards injected by JS -->
    </div>

  </div>

  <!-- Masonry view (natural heights) -->
  <div class="photo-masonry" id="photoMasonry">
    <!-- cells injected by JS -->
  </div>

  <!-- Justified view (masonry grid) -->
  <div class="photo-justified" id="photoJustified">
    <!-- cells injected by JS -->
  </div>

  <!-- Editorial view (hero/pair flex layout) -->
  <div class="photo-editorial" id="photoEditorial">
    <!-- cards injected by JS -->
  </div>

  <!-- Footer with theme toggle, left-adjusted -->
  <footer class="site-footer">
    <!-- Stack view -->
    <button class="view-toggle active" id="btnStack" aria-label="Stack view">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="10" height="9" rx="0.75"/>
        <path d="M4 5V3.5A.5.5 0 0 1 4.5 3h7a.5.5 0 0 1 .5.5V5"/>
        <path d="M5 3V2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 .5.5v1"/>
      </svg>
    </button>
    <!-- Masonry view -->
    <button class="view-toggle" id="btnMasonry" aria-label="Masonry view">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="2" width="4" height="12" rx="0.75"/>
        <rect x="6" y="5" width="4" height="9" rx="0.75"/>
        <rect x="11" y="3" width="4" height="7" rx="0.75"/>
      </svg>
    </button>
    <!-- Justified view -->
    <button class="view-toggle" id="btnJustified" aria-label="Justified view">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="1" width="8" height="6" rx="0.75"/>
        <rect x="10" y="1" width="5" height="6" rx="0.75"/>
        <rect x="1" y="9" width="5" height="6" rx="0.75"/>
        <rect x="7" y="9" width="8" height="6" rx="0.75"/>
      </svg>
    </button>
    <!-- Editorial view -->
    <button class="view-toggle" id="btnEditorial" aria-label="Editorial view">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="1" width="14" height="7" rx="0.75"/>
        <rect x="1" y="10" width="6" height="5" rx="0.75"/>
        <rect x="9" y="10" width="6" height="5" rx="0.75"/>
      </svg>
    </button>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <!-- Moon icon (shown in light mode) -->
      <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <!-- Sun icon (shown in dark mode) -->
      <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </footer>

  <script>
    const photos = [
      { src: 'images/photo-01.jpg', color: '#c41e3a' },
      { src: 'images/photo-02.jpg', color: '#1a1a2e' },
      { src: 'images/photo-03.jpg', color: '#e8d5b7' },
      { src: 'images/photo-04.jpg', color: '#2d5a27' },
      { src: 'images/photo-05.jpg', color: '#3d2b1f' },
      { src: 'images/photo-06.jpg', color: '#1c3557' },
      { src: 'images/photo-07.jpg', color: '#4a3728' },
      { src: 'images/photo-08.jpg', color: '#2c2c2c' },
      { src: 'images/photo-09.jpg', color: '#1a3a2a' },
      { src: 'images/photo-10.jpg', color: '#3a2020' },
    ];

    const cardLayer   = document.getElementById('cardLayer');
    const shadowLayer = document.getElementById('shadowLayer');
    let head = 0;
    let animating = false;

    // State: we always have up to 3 DOM cards: front, back, entering-back
    // Positions: pos-front, pos-back, pos-entering, pos-exiting

    function photoAt(i) {
      return photos[(i + photos.length) % photos.length];
    }

    function makeCard(photo, position) {
      // Card element
      const card = document.createElement('div');
      card.className = `photo-card pos-${position}`;
      card.style.background = photo.color;

      const img = document.createElement('img');
      img.src = photo.src;
      img.alt = '';
      card.appendChild(img);

      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      card.appendChild(overlay);

      // Shadow element
      const shadow = document.createElement('div');
      shadow.className = `shadow-card pos-${position}`;

      const blurInner = document.createElement('div');
      blurInner.className = 'blur-inner';
      const shadowImg = document.createElement('img');
      shadowImg.src = photo.src;
      shadowImg.alt = '';
      blurInner.appendChild(shadowImg);
      shadow.appendChild(blurInner);

      return { card, shadow };
    }

    // Bootstrap: create front and back cards
    function init() {
      const { card: frontCard, shadow: frontShadow } = makeCard(photoAt(head), 'front');
      const { card: backCard,  shadow: backShadow  } = makeCard(photoAt(head + 1), 'back');

      frontCard.addEventListener('click', advance, { once: true });

      cardLayer.appendChild(frontCard);
      cardLayer.appendChild(backCard);
      shadowLayer.appendChild(frontShadow);
      shadowLayer.appendChild(backShadow);
    }

    function advance() {
      if (animating) return;
      animating = true;
      head++;

      const [frontCard, backCard] = cardLayer.querySelectorAll('.photo-card');
      const [frontShadow, backShadow] = shadowLayer.querySelectorAll('.shadow-card');

      // 1. Create new incoming-back card (for the photo after current back)
      const { card: newBackCard, shadow: newBackShadow } = makeCard(photoAt(head + 1), 'entering');
      cardLayer.appendChild(newBackCard);
      shadowLayer.appendChild(newBackShadow);

      // Force layout so the initial pos-entering transform is applied before animating
      newBackCard.getBoundingClientRect();
      newBackShadow.getBoundingClientRect();

      // 2. Exit the front card
      frontCard.classList.replace('pos-front', 'pos-exiting');
      frontShadow.classList.replace('pos-front', 'pos-exiting');

      // 3. Promote back → front
      backCard.classList.replace('pos-back', 'pos-front');
      backCard.addEventListener('click', advance, { once: true });
      backShadow.classList.replace('pos-back', 'pos-front');

      // 4. Animate new back card in
      requestAnimationFrame(() => {
        newBackCard.classList.replace('pos-entering', 'pos-back');
        newBackShadow.classList.replace('pos-entering', 'pos-back');
      });

      // 5. After exit transition, remove old front
      frontCard.addEventListener('transitionend', () => {
        frontCard.remove();
        frontShadow.remove();
        animating = false;
      }, { once: true });
    }

    function retreat() {
      if (animating) return;
      animating = true;
      head--;

      const [frontCard, backCard]     = cardLayer.querySelectorAll('.photo-card');
      const [frontShadow, backShadow] = shadowLayer.querySelectorAll('.shadow-card');

      // 1. Create new front card (photo before current front) starting off-screen left
      const { card: newFrontCard, shadow: newFrontShadow } = makeCard(photoAt(head), 'left-entering');
      cardLayer.insertBefore(newFrontCard, frontCard);
      shadowLayer.insertBefore(newFrontShadow, frontShadow);

      // Force layout so the initial pos-left-entering transform applies before animating
      newFrontCard.getBoundingClientRect();
      newFrontShadow.getBoundingClientRect();

      // 2. Exit old back card further to the right
      backCard.classList.replace('pos-back', 'pos-right-exiting');
      backShadow.classList.replace('pos-back', 'pos-right-exiting');

      // 3. Move current front to back
      frontCard.classList.replace('pos-front', 'pos-back');
      frontCard.addEventListener('click', advance, { once: true });
      frontShadow.classList.replace('pos-front', 'pos-back');

      // 4. Animate new front in from the left
      requestAnimationFrame(() => {
        newFrontCard.classList.replace('pos-left-entering', 'pos-front');
        newFrontCard.addEventListener('click', advance, { once: true });
        newFrontShadow.classList.replace('pos-left-entering', 'pos-front');
      });

      // 5. Remove old back card after its exit transition
      backCard.addEventListener('transitionend', () => {
        backCard.remove();
        backShadow.remove();
        animating = false;
      }, { once: true });
    }

    // ─── Views ───
    const photoMasonry   = document.getElementById('photoMasonry');
    const photoJustified = document.getElementById('photoJustified');
    const photoEditorial = document.getElementById('photoEditorial');
    const photostack     = document.getElementById('photostack');

    function buildMasonry() {
      photos.forEach((photo, i) => {
        const cell = document.createElement('div');
        cell.className = 'masonry-cell';
        const img = document.createElement('img');
        img.src = photo.src;
        img.alt = '';
        cell.appendChild(img);
        cell.addEventListener('click', () => jumpTo(i));
        photoMasonry.appendChild(cell);
      });
    }

    function buildJustified() {
      photos.forEach((photo, i) => {
        const card = document.createElement('div');
        card.className = 'justified-card';

        const img = document.createElement('img');
        img.src = photo.src;
        img.alt = '';
        img.loading = i < 4 ? 'eager' : 'lazy';
        img.addEventListener('load', () => resizeJustifiedCard(card));

        card.appendChild(img);
        card.addEventListener('click', () => jumpTo(i));
        photoJustified.appendChild(card);
      });
    }

    function resizeJustifiedCard(card) {
      const styles = window.getComputedStyle(photoJustified);
      const rowH   = parseFloat(styles.getPropertyValue('grid-auto-rows'));
      const rowGap = parseFloat(styles.getPropertyValue('row-gap'));
      if (!rowH) return;
      const h = card.getBoundingClientRect().height;
      if (!h) return;
      card.style.gridRowEnd = `span ${Math.ceil((h + rowGap) / (rowH + rowGap))}`;
    }

    function resizeAllJustifiedCards() {
      requestAnimationFrame(() => {
        photoJustified.querySelectorAll('.justified-card').forEach(resizeJustifiedCard);
      });
    }

    function buildEditorial() {
      const PATTERNS = [
        // pair → pair → hero
        [{ s:50, i:70, a:'flex-end'   }, { s:50, i:100, a:'flex-start' },
         { s:50, i:100, a:'flex-end'  }, { s:50, i:70,  a:'flex-start' },
         { s:100, i:70, a:'center', large:true }],
        // hero → pair → pair
        [{ s:100, i:68, a:'center', large:true },
         { s:50, i:70, a:'flex-end'   }, { s:50, i:100, a:'flex-start' },
         { s:50, i:100, a:'flex-end'  }, { s:50, i:70,  a:'flex-start' }],
        // pair → hero → pair
        [{ s:50, i:100, a:'flex-end'  }, { s:50, i:70, a:'flex-start' },
         { s:100, i:72, a:'center', large:true },
         { s:50, i:70, a:'flex-end'   }, { s:50, i:100, a:'flex-start' }],
        // pair → hero (offset) → pair
        [{ s:50, i:70, a:'flex-end'   }, { s:50, i:100, a:'flex-start' },
         { s:100, i:66, a:'center', large:true },
         { s:50, i:100, a:'flex-end'  }, { s:50, i:70,  a:'flex-start' }],
      ];
      const GROUP = 5;

      photos.forEach((photo, i) => {
        const layout = PATTERNS[Math.floor(i / GROUP) % PATTERNS.length][i % GROUP];

        const card = document.createElement('div');
        card.className = 'editorial-card';
        if (layout.large) card.classList.add('is-large');
        card.style.setProperty('--slot', `${layout.s}%`);
        card.style.setProperty('--img-w', `${layout.i}%`);
        card.style.setProperty('--align', layout.a);

        const frame = document.createElement('div');
        frame.className = 'editorial-frame';

        const img = document.createElement('img');
        img.src = photo.src;
        img.alt = '';
        img.loading = i < 4 ? 'eager' : 'lazy';
        img.addEventListener('load', () => {
          img.classList.add('is-loaded');
          if (img.naturalHeight > img.naturalWidth) card.classList.add('is-portrait');
        });

        frame.appendChild(img);
        card.appendChild(frame);
        card.addEventListener('click', () => jumpTo(i));
        photoEditorial.appendChild(card);
      });
    }

    function jumpTo(index) {
      cardLayer.innerHTML = '';
      shadowLayer.innerHTML = '';
      head = index;
      animating = false;
      init();
      setView('stack');
    }

    // View buttons
    const btnStack     = document.getElementById('btnStack');
    const btnMasonry   = document.getElementById('btnMasonry');
    const btnJustified = document.getElementById('btnJustified');
    const btnEditorial = document.getElementById('btnEditorial');

    let currentView = 'stack';

    function setView(view) {
      currentView = view;
      photostack.style.display      = view === 'stack'     ? '' : 'none';
      photoMasonry.classList.toggle('active',    view === 'masonry');
      photoJustified.classList.toggle('active',  view === 'justified');
      photoEditorial.classList.toggle('active',  view === 'editorial');
      btnStack.classList.toggle('active',     view === 'stack');
      btnMasonry.classList.toggle('active',   view === 'masonry');
      btnJustified.classList.toggle('active', view === 'justified');
      btnEditorial.classList.toggle('active', view === 'editorial');
      if (view === 'justified') resizeAllJustifiedCards();
    }

    buildMasonry();
    buildJustified();
    buildEditorial();
    init();

    document.addEventListener('keydown', (e) => {
      if (currentView === 'stack') {
        if (e.key === 'ArrowRight') advance();
        if (e.key === 'ArrowLeft')  retreat();
      }
    });

    btnStack.addEventListener('click',     () => setView('stack'));
    btnMasonry.addEventListener('click',   () => setView('masonry'));
    btnJustified.addEventListener('click', () => setView('justified'));
    btnEditorial.addEventListener('click', () => setView('editorial'));

    let resizeTimer;
    window.addEventListener('resize', () => {
      if (currentView !== 'justified') return;
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resizeAllJustifiedCards, 120);
    });


    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const iconMoon    = document.getElementById('iconMoon');
    const iconSun     = document.getElementById('iconSun');

    themeToggle.addEventListener('click', () => {
      const isDark = document.body.classList.toggle('dark');
      iconMoon.style.display = isDark ? 'none'  : 'block';
      iconSun.style.display  = isDark ? 'block' : 'none';
    });
  </script>
</body>
</html>
